<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Console | Event Portal</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: var(--paper);">
    <header>
        <div class="logo" style="cursor:pointer" onclick="window.location.href='/'">EVENT PORTAL</div>
    </header>

    <div class="container fade-in" style="padding-top: 10rem;">
        <div class="form-card" style="margin: 0 auto;">
            <span style="color: var(--coral); font-weight: 850; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase;">ADMINISTRATION ACCESS</span>
            <h1 style="font-size: 3rem; font-weight: 900; letter-spacing: -0.06em; margin: 1.5rem 0; color:var(--black);">Authenticate</h1>
            <p style="color: rgba(0,0,0,0.4); font-size: 1rem; margin-bottom: 4rem;">Enter your management credentials to access the console.</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="admin@mec.in">
                </div>
                <div class="form-group">
                    <label>Security Key</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; justify-content: center; margin-top: 2rem;">Log In</button>
            </form>
            
            <div id="error" style="color: var(--coral); margin-top: 2rem; font-size: 0.8rem; font-weight: 900; text-align: center; text-transform: uppercase; display: none;">
                <i class="fas fa-exclamation-triangle"></i> Verification Failed
            </div>
            
            <div style="margin-top: 5rem; padding-top: 3rem; border-top: 1px solid var(--stone); text-align: center;">
                <p style="font-size: 0.7rem; color: rgba(0,0,0,0.3); font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;">Default: admin@mec.in / admin123</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const errDiv = document.getElementById('error');
            
            btn.disabled = true;
            btn.innerText = 'Syncing...';
            errDiv.style.display = 'none';

            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    window.location.href = '/admin';
                } else {
                    errDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = 'Log In';
                }
            } catch (err) {
                alert('Database Connection Failed.');
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
